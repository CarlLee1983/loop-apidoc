        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                language:
                  type: string
                  description: 用户语系([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/fu-lu/yu-xi-lie-biao.md))
                loginname:
                  type: string
                  description: 玩家名称+后缀(suffix)
                rid:
                  type: string
                  description: 桌号 tableid ([点击查看](/pages/eKP65RR00NcZ1oYQQOJD))。非必要参数，填入桌号可进指定牌桌。
                betlimit:
                  type: string
                  description: 限红列表([点击查看](https://vg-organization.gitbook.io/vg-docs/vg-wen-dang/dan-yi-qian-bao/api/you-xi/xian-hong-lie-biao#id-200))。非必要参数，可在登入时设置当前玩家限红。
                return_url:
                  type: string
                  description: 重新导向 URL
                sign:
                  type: string
                  description: 签名([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/jia-mi-shuo-ming.md))
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_vgtransfer_sign_in
  /vgtransfer/points:
    post:
      summary: 玩家上分 / 下分。
      tags:
      - 转账钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                loginname:
                  type: string
                  description: 玩家名称
                amount:
                  type: integer
                  description: 转账金额
                sid:
                  type: string
                  description: 商户产值 ( 商户转账唯一订单号12位以上 )
                status:
                  type: string
                  description: 'in = 转进

                    out = 转出'
                sign:
                  type: string
                  description: 签名([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/jia-mi-shuo-ming.md))
        required: true
      security:
      - sign: []
      responses:
