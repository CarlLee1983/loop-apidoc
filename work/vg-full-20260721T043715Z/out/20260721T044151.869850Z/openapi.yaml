openapi: 3.1.0
info:
  title: VG 文档
  version: 0.0.0
  x-loop-status: missing-source
tags:
- name: 单一钱包
- name: 转账钱包
paths:
  /vg/sign-up:
    post:
      summary: 注册用户。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                betlimit:
                  type: string
                  description: 限红列表(点击查看)
                loginname:
                  type: string
                  description: 玩家名称+后缀(suffix)，仅限小写英文字母、数字
                sign:
                  type: string
                  description: 签名(点击查看)
        required: true
        description: 注册用户。
      security:
      - sign: []
      responses:
        default:
          description: Success envelope with code, message, data (uid, username, betlimit),
            and TraceId
      operationId: post_vg_sign_up
  /vg/sign-in:
    post:
      summary: 取得登入特定游戏的启动URL。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                language:
                  type: string
                  description: 用户语系(点击查看)
                loginname:
                  type: string
                  description: 玩家名称+后缀(suffix)
                rid:
                  type: string
                  description: 桌号 tableid (点击查看)。非必要参数，填入桌号可进指定牌桌。
                betlimit:
                  type: string
                  description: 限红列表(点击查看)。非必要参数，可在登入时设置当前玩家限红。
                return_url:
                  type: string
                  description: 重新导向 URL
                token:
                  type: string
                  description: 身份令牌
                sign:
                  type: string
                  description: 签名(点击查看)
        required: true
        description: 取得登入特定游戏的启动URL。
      security:
      - sign: []
      responses:
        default:
          description: Success envelope with code, message, data.url (launch URL),
            and TraceId
      operationId: post_vg_sign_in
  /vg/bet/users:
    post:
      summary: 查询玩家每笔投注详细记录。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                starttime:
                  description: 必要(请求参数中使用 roundid、betid 时非必要)。UTC+8, 'YYYY-MM-DD HH:mm:ss'，时间区间不可超过
                    5 分钟
                endtime:
                  description: 必要(请求参数中使用 roundid、betid 时非必要)。UTC+8, 'YYYY-MM-DD HH:mm:ss'，时间区间不可超过
                    5 分钟
                roundid:
                  type: string
                  description: 局号(可查询一个月内的记录)
                betid:
                  type: string
                  description: 投注号(可查询一个月内的记录)
                page_num:
                  type: integer
                  description: 页数
                page_size:
                  type: integer
                  description: '每页笔数，max: 2000'
                status:
                  type: integer
                  description: 1 = 未结算，4 = 已结算，9 = 无效单。若不带此参数默认将回应所有状态纪录。
                sign:
                  type: string
                  description: 签名(点击查看)
              required:
              - agent
              - starttime
              - endtime
              - page_num
              - page_size
              - sign
        required: true
        description: 查询玩家每笔投注详细记录。
      security:
      - sign: []
      responses:
        default:
          description: Success envelope with pagination fields and betdetail array
            (roundid, betid, username, shoeid, shoeround, casino, valid, bet, win,
            currency, tableidx, bettime, settletime, status, ip, bettype, platform,
            betresult, detail)
      operationId: post_vg_bet_users
  /vg/bet/limit:
    post:
      summary: 调整玩家限红。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                betlimit:
                  type: string
                  description: 限红列表(点击查看)
                loginname:
                  type: string
                  description: 玩家名称
                sign:
                  type: string
                  description: 签名(点击查看)
        required: true
        description: 调整玩家限红。
      security:
      - sign: []
      responses:
        default:
          description: Success envelope with code, message, and TraceId (no data field
            in example)
      operationId: post_vg_bet_limit
  /vg/bet/limit/list:
    post:
      summary: 查询代理当前可用限红。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                sign:
                  type: string
                  description: 签名(点击查看)
        required: true
        description: 查询代理当前可用限红。
      security:
      - sign: []
      responses:
        default:
          description: 'Success envelope with code, message, data array of limit-code
            objects (e.g. {"A": "100-2000"}), and TraceId'
      operationId: post_vg_bet_limit_list
  /vg/table/list:
    post:
      summary: 查询所有牌桌。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                sign:
                  type: string
                  description: 签名(点击查看)
        required: true
        description: 查询所有牌桌。
      security:
      - sign: []
      responses:
        default:
          description: Success envelope with code, message, data array of table objects
            (tableid, casino, tablename, tablename_cn, time), and TraceId
      operationId: post_vg_table_list
  /bet:
    post:
      summary: 商户投注接口。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 商户名称
                loginname:
                  type: string
                  description: 玩家名称
                token:
                  type: string
                  description: 玩家令牌
                roundid:
                  type: string
                  description: 游戏局号
                transid:
                  type: string
                  description: 投注号 (betid)
                amount:
                  type: number
                  description: 投注金额
                sign:
                  type: string
                  description: 签名 (未包含 detail)
                detail:
                  type: object
                  properties:
                    bubalance:
                      type: string
                    tableid:
                      type: string
                    tableidx:
                      type: string
                    shoeid:
                      type: string
                    currency:
                      type: string
                    ts:
                      type: number
                    shoeround:
                      type: string
                    platform:
                      type: string
                    bettype:
                      type: string
                    ip:
                      type: string
                    maxlose:
                      type: number
                    maxwin:
                      type: number
                    bw:
                      type: number
                    pw:
                      type: number
                    tie:
                      type: number
                    bp:
                      type: number
                    pp:
                      type: number
                    big:
                      type: number
                    small:
                      type: number
                    lucky6:
                      type: number
                    ap:
                      type: number
                    pfp:
                      type: number
                    betlimit:
                      type: string
                  description: 其他资讯
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_bet
  /cancel:
    post:
      summary: 商户取消投注/结算接口。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 商户名称
                loginname:
                  type: string
                  description: 玩家名称
                roundid:
                  type: string
                  description: 游戏局号
                transid:
                  type: string
                  description: 投注号 (betid)
                amount:
                  type: number
                  description: 取消投注 = 投注金额；取消结算 = 派彩金额 - 投注金额
                sign:
                  type: string
                  description: 签名 (未包含 detail)
                detail:
                  type: object
                  properties:
                    id:
                      type: integer
                    token:
                      type: string
                    currency:
                      type: string
                    bw:
                      type: string
                    pw:
                      type: string
                    tie:
                      type: string
                    bp:
                      type: string
                    pp:
                      type: string
                    big:
                      type: string
                    small:
                      type: string
                    lucky6:
                      type: string
                    ap:
                      type: string
                    pfp:
                      type: string
                    bw_win:
                      type: string
                    pw_win:
                      type: string
                    tie_win:
                      type: string
                    bp_win:
                      type: string
                    pp_win:
                      type: string
                    big_win:
                      type: string
                    small_win:
                      type: string
                    lucky6_win:
                      type: string
                    ap_win:
                      type: string
                    pfp_win:
                      type: string
                    abet:
                      type: string
                    abet2:
                      type: string
                    tableidx:
                      type: string
                    shoeid:
                      type: integer
                    shoeround:
                      type: integer
                    btimestamp:
                      type: integer
                    bettime:
                      type: string
                    settletime: {}
                    percentage: {}
                    fanshui: {}
                    status:
                      type: integer
                    ip:
                      type: string
                    bettype:
                      type: string
                    platform:
                      type: string
                    detail: {}
                  description: 其他资讯
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_cancel
  /win:
    post:
      summary: 商户派彩接口。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 商户名称
                loginname:
                  type: string
                  description: 玩家名称
                roundid:
                  type: string
                  description: 游戏局号
                transid:
                  type: string
                  description: 投注号 (betid)
                amount:
                  type: number
                  description: 派彩金额
                sign:
                  type: string
                  description: 签名 (未包含 detail)
                detail:
                  type: object
                  properties:
                    id:
                      type: number
                    token:
                      type: string
                    currency:
                      type: string
                    bw:
                      type: string
                    pw:
                      type: string
                    tie:
                      type: string
                    bp:
                      type: string
                    pp:
                      type: string
                    big:
                      type: string
                    small:
                      type: string
                    lucky6:
                      type: string
                    ap:
                      type: string
                    pfp:
                      type: string
                    bw_win:
                      type: string
                    pw_win:
                      type: string
                    tie_win:
                      type: string
                    bp_win:
                      type: string
                    pp_win:
                      type: string
                    big_win:
                      type: string
                    small_win:
                      type: string
                    lucky6_win:
                      type: string
                    ap_win:
                      type: string
                    pfp_win:
                      type: string
                    abet:
                      type: string
                    abet2:
                      type: string
                    tableidx:
                      type: string
                    shoeid:
                      type: number
                    shoeround:
                      type: number
                    btimestamp:
                      type: number
                    bettime:
                      type: string
                    settletime: {}
                    percentage: {}
                    fanshui: {}
                    status:
                      type: number
                    ip:
                      type: string
                    bettype:
                      type: string
                    platform:
                      type: string
                    detail: {}
                  description: 其他资讯
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_win
  /resettle:
    post:
      summary: 商户重新派彩接口。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 商户名称
                loginname:
                  type: string
                  description: 玩家名称
                roundid:
                  type: string
                  description: 游戏局号
                transid:
                  type: string
                  description: 投注号 (betid)
                amount:
                  type: number
                  description: 当笔资料最终派彩金额，不会扣/补前次派彩金额
                sign:
                  type: string
                  description: 签名 (未包含 detail)
                detail:
                  type: object
                  description: 其他资讯
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_resettle
  /balance:
    post:
      summary: 查询玩家余额。
      tags:
      - 单一钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 商户名称
                loginname:
                  type: string
                  description: 玩家名称
                token:
                  type: string
                  description: 玩家令牌
                sign:
                  type: string
                  description: 签名([点击查看](/vg-docs/vg-wen-dang/dan-yi-qian-bao/jia-mi-shuo-ming.md))
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_balance
  /vgtransfer/sign-up:
    post:
      summary: 注册用户。
      tags:
