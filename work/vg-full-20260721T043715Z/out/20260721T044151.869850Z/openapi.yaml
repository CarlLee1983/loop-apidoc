      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                betlimit:
                  type: string
                  description: 限红列表([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/api/you-xi/xian-hong-lie-biao.md))
                loginname:
                  type: string
                  description: 玩家名称+后缀(suffix) 仅限小写英文字母、数字
                sign:
                  type: string
                  description: 签名([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/jia-mi-shuo-ming.md))
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_vgtransfer_sign_up
