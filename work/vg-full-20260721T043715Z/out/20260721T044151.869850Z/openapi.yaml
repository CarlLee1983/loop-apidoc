                  type: string
                  description: 代理名称
                username:
                  type: string
                  description: 玩家名称
                sign:
                  type: string
                  description: 签名([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/jia-mi-shuo-ming.md))
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_vgtransfer_balance
  /vgtransfer/log:
    post:
      summary: 查询玩家转账记录。时间区间不可超过 5 分钟
      tags:
      - 转账钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                starttime:
                  description: UTC+8, 'YYYY-MM-DD HH:mm:ss'
                endtime:
                  description: UTC+8, 'YYYY-MM-DD HH:mm:ss'
                page_num:
                  type: integer
                  description: 页数
                page_size:
                  type: integer
                  description: '每页笔数

                    max: 2000'
                status:
                  type: string
                  description: 'in = 转进

                    out = 转出

                    若不带此参数默认将回应所有状态纪录。'
                sid:
                  type: string
                  description: '转账单号

                    若不带此参数默认将回应所有订单纪录。'
                sign:
                  type: string
                  description: 签名([点击查看](/vg-docs/vg-wen-dang/zhuan-zhang-qian-bao/jia-mi-shuo-ming.md))
        required: true
        description: 查询玩家转账记录。时间区间不可超过 5 分钟
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_vgtransfer_log
  /vgtransfer/bet/users:
    post:
      summary: 查询玩家每笔投注详细记录。
      tags:
      - 转账钱包
      parameters:
      - name: Content-Type
        in: header
        required: false
        schema: {}
        description: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: 代理名称
                starttime:
                  description: 'UTC+8, ''YYYY-MM-DD HH:mm:ss''

                    时间区间不可超过 5 分钟

                    (请求参数中使用 roundid、betid 时非必要)'
                endtime:
                  description: 'UTC+8, ''YYYY-MM-DD HH:mm:ss''

                    时间区间不可超过 5 分钟

                    (请求参数中使用 roundid、betid 时非必要)'
                roundid:
                  type: string
                  description: '局号

                    (可查询一个月内的记录)'
                betid:
                  type: string
                  description: '投注号

                    (可查询一个月内的记录)'
                page_num:
                  type: integer
                  description: 页数
                page_size:
                  type: integer
                  description: '每页笔数

                    max: 2000'
                status:
                  type: integer
                  description: '1 = 未结算

                    4 = 已结算

                    9 = 无效单

                    若不带此参数默认将回应所有状态纪录。'
                sign:
                  type: string
                  description: 签名[(点击查看](/pages/xcqV5MT88Fe4CmEAPdRe))
              required:
              - agent
              - starttime
              - endtime
              - page_num
              - page_size
              - sign
        required: true
      security:
      - sign: []
      responses:
        default:
          description: Success
      operationId: post_vgtransfer_bet_users
  /vgtransfer/bet/limit:
    post:
      summary: 调整玩家限红。
