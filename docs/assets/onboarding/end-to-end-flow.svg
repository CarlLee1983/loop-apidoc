<svg width="1120" height="660" viewBox="0 0 1120 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">一次完整執行的端到端資料流</title>
  <desc id="desc">從可選 PDF 前處理、agent 擷取、manifest、plan、preparation、generate、validate，到可選 score 與 diff 的完整資料流。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2c3043" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#15a39a"/>
    </marker>
    <style>
      text{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .h{font-size:26px;font-weight:900;fill:#2c3043}
      .p{font-size:16px;fill:#5d6478}
      .stage{font-size:18px;font-weight:850;fill:#2c3043}
      .out{font-size:13px;font-weight:750}
      .lane{font-size:14px;font-weight:900;letter-spacing:.12em}
    </style>
  </defs>
  <rect width="1120" height="660" rx="28" fill="#fff"/>
  <rect x="24" y="24" width="1072" height="612" rx="24" fill="#faf7ef" stroke="#ece5d8" stroke-width="2"/>
  <text x="62" y="78" class="h">端到端資料流：從來源到可審查 run-dir</text>
  <text x="62" y="111" class="p">灰色是可選階段；中間 1-6 是建立可信 API 契約的主幹。</text>

  <rect x="62" y="156" width="996" height="102" rx="16" fill="#fff" stroke="#ece5d8"/>
  <rect x="62" y="290" width="996" height="102" rx="16" fill="#fff" stroke="#ece5d8"/>
  <rect x="62" y="424" width="996" height="102" rx="16" fill="#fff" stroke="#ece5d8"/>
  <text x="88" y="186" class="lane" fill="#7c6df2">可選前處理 / 擷取層</text>
  <text x="88" y="320" class="lane" fill="#15a39a">確定性組裝 / 驗證層</text>
  <text x="88" y="454" class="lane" fill="#7c6df2">後段判讀 / 版本層</text>

  <g filter="url(#shadow)">
    <rect x="122" y="198" width="148" height="74" rx="12" fill="#e7e3fd" stroke="#7c6df2"/>
    <text x="196" y="226" text-anchor="middle" class="stage">0 preprocess</text>
    <text x="196" y="250" text-anchor="middle" class="mono out" fill="#5b4cc4">sources_md/</text>
    <rect x="342" y="198" width="148" height="74" rx="12" fill="#fdeccb" stroke="#f5a524"/>
    <text x="416" y="226" text-anchor="middle" class="stage">1 擷取</text>
    <text x="416" y="250" text-anchor="middle" class="mono out" fill="#b5791a">inventory + endpoints</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="122" y="332" width="132" height="74" rx="12" fill="#d8f3f0" stroke="#15a39a"/>
    <text x="188" y="360" text-anchor="middle" class="stage">2 manifest</text>
    <text x="188" y="384" text-anchor="middle" class="mono out" fill="#0f7a73">manifest.json</text>
    <rect x="304" y="332" width="132" height="74" rx="12" fill="#d8f3f0" stroke="#15a39a"/>
    <text x="370" y="360" text-anchor="middle" class="stage">3 plan</text>
    <text x="370" y="384" text-anchor="middle" class="mono out" fill="#0f7a73">normalization-plan</text>
    <rect x="486" y="332" width="132" height="74" rx="12" fill="#d8f3f0" stroke="#15a39a"/>
    <text x="552" y="360" text-anchor="middle" class="stage">4 preparation</text>
    <text x="552" y="384" text-anchor="middle" class="mono out" fill="#0f7a73">readiness report</text>
    <rect x="668" y="332" width="132" height="74" rx="12" fill="#d8f3f0" stroke="#15a39a"/>
    <text x="734" y="360" text-anchor="middle" class="stage">5 generate</text>
    <text x="734" y="384" text-anchor="middle" class="mono out" fill="#0f7a73">OpenAPI + guide</text>
    <rect x="850" y="332" width="132" height="74" rx="12" fill="#d8f3f0" stroke="#15a39a"/>
    <text x="916" y="360" text-anchor="middle" class="stage">6 validate</text>
    <text x="916" y="384" text-anchor="middle" class="mono out" fill="#0f7a73">report</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="668" y="466" width="132" height="74" rx="12" fill="#e7e3fd" stroke="#7c6df2"/>
    <text x="734" y="494" text-anchor="middle" class="stage">7 score</text>
    <text x="734" y="518" text-anchor="middle" class="mono out" fill="#5b4cc4">quality signal</text>
    <rect x="850" y="466" width="132" height="74" rx="12" fill="#e7e3fd" stroke="#7c6df2"/>
    <text x="916" y="494" text-anchor="middle" class="stage">8 diff</text>
    <text x="916" y="518" text-anchor="middle" class="mono out" fill="#5b4cc4">impact report</text>
  </g>
  <path d="M270 235H342" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M490 235C590 235 94 300 122 369" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M254 369H304" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M436 369H486" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M618 369H668" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 369H850" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M916 406V466" stroke="#7c6df2" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M850 503H800" stroke="#7c6df2" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="392" y="566" width="336" height="42" rx="21" fill="#2c3043"/>
  <text x="560" y="592" text-anchor="middle" class="mono" font-size="15" font-weight="800" fill="#ffd9a8">run-dir = 契約 + 證據 + 品質 + 交接資產</text>
</svg>
