<svg width="1120" height="620" viewBox="0 0 1120 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">loop-apidoc 四個閉環的流層</title>
  <desc id="desc">來源依據、品質、版本與交接四個閉環圍繞來源真實性核心，形成可重跑、可驗證、可交接的文件 pipeline。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2c3043" flood-opacity=".18"/>
    </filter>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#15a39a"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#7c6df2"/>
    </marker>
    <style>
      text{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .h{font-size:26px;font-weight:800;fill:#2c3043}
      .p{font-size:17px;fill:#5d6478}
      .small{font-size:15px;fill:#5d6478}
      .label{font-size:18px;font-weight:800;fill:#2c3043}
      .file{font-size:15px;font-weight:700}
    </style>
  </defs>
  <rect width="1120" height="620" rx="28" fill="#fff"/>
  <rect x="24" y="24" width="1072" height="572" rx="24" fill="#faf7ef" stroke="#ece5d8" stroke-width="2"/>
  <text x="68" y="78" class="h">四個閉環不是四份文件，而是同一條 pipeline 的四層保護</text>
  <text x="68" y="111" class="p">每一層都回到來源真實性：來源沒寫就標記缺漏，輸出必須可追溯，完成品要能被下一位工程師接手。</text>

  <g filter="url(#shadow)">
    <circle cx="560" cy="330" r="114" fill="#2c3043"/>
    <circle cx="560" cy="330" r="90" fill="#fff" opacity=".08"/>
    <text x="560" y="305" text-anchor="middle" font-size="19" font-weight="800" fill="#fff">核心不變式</text>
    <text x="560" y="337" text-anchor="middle" font-size="31" font-weight="900" fill="#fff">來源是真實來源</text>
    <text x="560" y="371" text-anchor="middle" class="mono" font-size="17" fill="#ffd9a8">missing / conflict / null</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="184" width="312" height="120" rx="16" fill="#d8f3f0" stroke="#15a39a" stroke-width="2"/>
    <text x="116" y="224" class="label">Source-grounded loop</text>
    <text x="116" y="254" class="file mono" fill="#0f7a73">sources -> extraction -> provenance</text>
    <text x="116" y="283" class="small">所有欄位都要能回到來源段落。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="724" y="184" width="312" height="120" rx="16" fill="#ffe2dd" stroke="#ff6f61" stroke-width="2"/>
    <text x="756" y="224" class="label">Quality loop</text>
    <text x="756" y="254" class="file mono" fill="#d9483b">preparation -> validate -> score</text>
    <text x="756" y="283" class="small">生成前標風險，生成後阻擋錯誤。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="84" y="390" width="312" height="120" rx="16" fill="#fdeccb" stroke="#f5a524" stroke-width="2"/>
    <text x="116" y="430" class="label">Version loop</text>
    <text x="116" y="460" class="file mono" fill="#b5791a">run-dir -> diff/report</text>
    <text x="116" y="489" class="small">版本變化依 downstream impact 分類。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="724" y="390" width="312" height="120" rx="16" fill="#e7e3fd" stroke="#7c6df2" stroke-width="2"/>
    <text x="756" y="430" class="label">Handoff loop</text>
    <text x="756" y="460" class="file mono" fill="#5b4cc4">contract -> examples -> handoff/</text>
    <text x="756" y="489" class="small">把契約、範例、任務清單留給接手者。</text>
  </g>

  <path d="M393 246 C472 219 496 238 514 259" stroke="#15a39a" stroke-width="4" marker-end="url(#arrow-teal)"/>
  <path d="M728 246 C648 219 624 238 606 259" stroke="#ff6f61" stroke-width="4" marker-end="url(#arrow-teal)"/>
  <path d="M393 452 C472 480 496 455 514 401" stroke="#f5a524" stroke-width="4" marker-end="url(#arrow-purple)"/>
  <path d="M728 452 C648 480 624 455 606 401" stroke="#7c6df2" stroke-width="4" marker-end="url(#arrow-purple)"/>
</svg>
